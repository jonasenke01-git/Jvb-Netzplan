/* ================================================================
   SVG BUILDER
   ================================================================ */

const svg  = document.getElementById('map-svg');
const NS   = 'http://www.w3.org/2000/svg';
const MAP_W = 1060, MAP_H = 960;
svg.setAttribute('width',   MAP_W);
svg.setAttribute('height',  MAP_H);
svg.setAttribute('viewBox', `0 0 ${MAP_W} ${MAP_H}`);

const lineById = {};
LINES_DEF.forEach(l => lineById[l.id] = l);

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  if (text !== undefined) e.textContent = text;
  return e;
}

/* Resolve hub placeholder to actual coordinates */
function resolveRoute(route) {
  return route.map(s => s.id === 'hub' ? { ...s, x: HUB.x, y: HUB.y } : s);
}

/* Metro-style path: only 45° and 90° turns */
function metroPath(pts) {
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 1; i < pts.length; i++) {
    const ax = pts[i-1].x, ay = pts[i-1].y;
    const bx = pts[i].x,   by = pts[i].y;
    const dx = bx - ax, dy = by - ay;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (adx < 2 || ady < 2) {
      d += ` L ${bx} ${by}`;
    } else if (Math.abs(adx - ady) < 4) {
      // Perfectly diagonal
      d += ` L ${bx} ${by}`;
    } else if (adx > ady) {
      // Horizontal dominant: turn at 45° then go straight
      const tx = ax + Math.sign(dx) * ady;
      d += ` L ${tx} ${by} L ${bx} ${by}`;
    } else {
      // Vertical dominant: go straight then 45°
      const ty = ay + Math.sign(dy) * adx;
      d += ` L ${bx} ${ty} L ${bx} ${by}`;
    }
  }
  return d;
}

  const rLabel = el('text', {
    x:'595', y:'500', fill:'rgba(100,160,200,0.45)',
    'font-size':'11', 'font-style':'italic', 'font-family':'Arial',
    transform:'rotate(-72 595 500)'
  }, 'Rhein');
  svg.appendChild(rLabel);

  svg.appendChild(el('text', {
    x:'800', y:'920', fill:'rgba(100,70,20,0.045)',
    'font-size':'100', 'font-weight':'900', 'font-family':'Arial Narrow,Arial'
  }, 'KÖLN'));
}

/* ── LINES ── */
function buildLines() {
  const g = el('g', { id:'lines-layer' });

  Object.entries(ROUTES).forEach(([lineId, rawRoute]) => {
    const line  = lineById[lineId];
    const route = resolveRoute(rawRoute);
    const d     = metroPath(route);

    // White halo
    g.appendChild(el('path', {
      d, stroke:'#ede9da', 'stroke-width':'13',
      fill:'none', 'stroke-linecap':'round', 'stroke-linejoin':'round'
    }));
    // Coloured line
    g.appendChild(el('path', {
      d, stroke: line.color, 'stroke-width':'7',
      fill:'none', 'stroke-linecap':'round', 'stroke-linejoin':'round'
    }));
  });

  svg.appendChild(g);
}

/* ── STATIONS ── */
function buildStations() {
  // Collect unique stations with their resolved positions
  const seen = {};
  Object.entries(ROUTES).forEach(([lineId, rawRoute]) => {
    const route = resolveRoute(rawRoute);
    route.forEach(s => {
      if (!s.id || s.id === 'hub') return;
      if (!seen[s.id]) seen[s.id] = { ...s, lines: [] };
      if (!seen[s.id].lines.includes(lineId)) seen[s.id].lines.push(lineId);
    });
  });

  // Add hub
  seen['hub_central'] = {
    id: 'hub_central', name: 'WDR Köln',
    sub: 'Jahresvolontariat · 10/2025 – 09/2026',
    desc: 'Ausbildung zum cross-medialen Redakteur und Reporter.',
    tags: ['Volontariat','Crossmedial','ARD'],
    lines: LINES_DEF.map(l => l.id),
    x: HUB.x, y: HUB.y, isHub: true
  };

  const g = el('g', { id:'stations-layer' });

  Object.values(seen).forEach(s => {
    const sg    = el('g', { 'data-id': s.id, class:'station-g' });
    sg.style.cursor = 'pointer';

    const linesArr  = s.lines || [];
    const isHub     = s.isHub;
    const isXfer    = linesArr.length > 1;
    const isTerm    = s.terminus;
    const primLine  = lineById[linesArr[0]];
    const outerR    = isHub ? 20 : isXfer ? 12 : isTerm ? 9 : 7;

    // ── Hub: large multi-colour pie ──
    if (isHub) {
      // Outer double ring
      sg.appendChild(el('circle', { cx:s.x, cy:s.y, r:outerR+8, fill:'none', stroke:'#c8b890','stroke-width':'2' }));
      sg.appendChild(el('circle', { cx:s.x, cy:s.y, r:outerR+3, fill:'#ede9da' }));
      // Pie segments
      linesArr.forEach((lid, i) => {
        const lc   = lineById[lid]?.color || '#888';
        const n    = linesArr.length;
        const a0   = (i / n) * Math.PI * 2 - Math.PI/2;
        const a1   = ((i+1)/n) * Math.PI * 2 - Math.PI/2;
        const x0   = s.x + outerR * Math.cos(a0);
        const y0   = s.y + outerR * Math.sin(a0);
        const x1   = s.x + outerR * Math.cos(a1);
        const y1   = s.y + outerR * Math.sin(a1);
        sg.appendChild(el('path', {
          d: `M ${s.x} ${s.y} L ${x0} ${y0} A ${outerR} ${outerR} 0 0 1 ${x1} ${y1} Z`,
          fill: lc
        }));
      });
      sg.appendChild(el('circle', { cx:s.x, cy:s.y, r:7, fill:'#fff' }));
      sg.appendChild(el('circle', { cx:s.x, cy:s.y, r:3, fill:'#1a0f00' }));

    // ── Interchange: double ring with colours ──
    } else if (isXfer) {
      sg.appendChild(el('circle', { cx:s.x, cy:s.y, r:outerR+4, fill:'none', stroke:'#ede9da','stroke-width':'4' }));
      linesArr.forEach((lid, i) => {
        const lc  = lineById[lid]?.color || '#888';
        const n   = linesArr.length;
        const a0  = (i/n)*Math.PI*2 - Math.PI/2;
        const a1  = ((i+1)/n)*Math.PI*2 - Math.PI/2;
        const x0  = s.x + outerR*Math.cos(a0);
        const y0  = s.y + outerR*Math.sin(a0);
        const x1  = s.x + outerR*Math.cos(a1);
        const y1  = s.y + outerR*Math.sin(a1);
        sg.appendChild(el('path', {
          d:`M ${s.x} ${s.y} L ${x0} ${y0} A ${outerR} ${outerR} 0 0 1 ${x1} ${y1} Z`,
          fill: lc
        }));
      });
      sg.appendChild(el('circle', { cx:s.x, cy:s.y, r:outerR*0.42, fill:'#fff' }));

    // ── Terminus: filled rectangle ──
    } else if (isTerm) {
      sg.appendChild(el('rect', {
        x:s.x-5, y:s.y-9, width:10, height:18, rx:2,
        fill: primLine?.color || '#888'
      }));
      sg.appendChild(el('circle', { cx:s.x, cy:s.y, r:4, fill:'#fff' }));

    // ── Regular station ──
    } else {
      sg.appendChild(el('circle', { cx:s.x, cy:s.y, r:outerR, fill:'#fff', stroke: primLine?.color||'#888', 'stroke-width':'3' }));
      sg.appendChild(el('circle', { cx:s.x, cy:s.y, r:3, fill: primLine?.color||'#888' }));
    }

    // ── Label ──
    if (!isHub) {
      const labelLeft = (s.labelSide === 'left')  ? true
                      : (s.labelSide === 'right') ? false
                      : s.x < HUB.x;
      const lx = s.x + (labelLeft ? -(outerR+5) : (outerR+5));
      const anchor = labelLeft ? 'end' : 'start';
      const ly = s.y - 2;

      // Halo
      sg.appendChild(el('text', {
        x:lx, y:ly, 'font-family':'Arial Narrow,Arial', 'font-size':'9.5',
        'font-weight':'700', fill:'none', stroke:'rgba(237,233,218,0.9)',
        'stroke-width':'3.5', 'text-anchor':anchor
      }, s.name));
      sg.appendChild(el('text', {
        x:lx, y:ly, 'font-family':'Arial Narrow,Arial', 'font-size':'9.5',
        'font-weight':'700', fill:'#1a0f00', 'text-anchor':anchor
      }, s.name));

      // Sub-label (period/role)
      if (s.sub) {
        sg.appendChild(el('text', {
          x:lx, y:ly+11, 'font-family':'Arial Narrow,Arial', 'font-size':'7.5',
          fill:'rgba(237,233,218,0.85)', stroke:'rgba(237,233,218,0.85)',
          'stroke-width':'3', 'text-anchor':anchor
        }, s.sub));
        sg.appendChild(el('text', {
          x:lx, y:ly+11, 'font-family':'Arial Narrow,Arial', 'font-size':'7.5',
          fill:'#8b7040', 'text-anchor':anchor, 'font-weight':'600'
        }, s.sub));
      }
    } else {
      // Hub label below
      sg.appendChild(el('text', {
        x:s.x, y:s.y+outerR+18, 'font-size':'13', 'font-weight':'900',
        'font-family':'Arial Narrow,Arial', fill:'#1a0f00', 'text-anchor':'middle'
      }, 'WDR Köln'));
      sg.appendChild(el('text', {
        x:s.x, y:s.y+outerR+30, 'font-size':'8', 'font-weight':'700',
        'font-family':'Arial Narrow,Arial', fill:'#8b7040', 'text-anchor':'middle'
      }, 'Alle Linien · Zentralhaltestelle'));
    }

    // Hit area
    const hit = el('circle', { cx:s.x, cy:s.y, r: Math.max(outerR+14,22), fill:'transparent' });
    const stationData = isHub
      ? seen['hub_central']
      : Object.values(seen).find(st => st.id === s.id);
    hit.addEventListener('click',    (e) => { e.stopPropagation(); openInfo(stationData || s); });
    hit.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); openInfo(stationData || s); });
    sg.appendChild(hit);

    g.appendChild(sg);
  });

  svg.appendChild(g);
}

/* ── LINE NUMBER BADGES at termini ── */
function buildBadges() {
  const g = el('g', { id:'badges-layer' });

  Object.entries(ROUTES).forEach(([lineId, rawRoute]) => {
    const line  = lineById[lineId];
    const route = resolveRoute(rawRoute);

    [route[0], route[route.length-1]].forEach(s => {
      if (!s.terminus) return;
      const bW = 22, bH = 14;
      // Place badge above or below terminus
      const by = s.y < HUB.y ? s.y - bH - 20 : s.y + 20;
      g.appendChild(el('rect', {
        x: s.x - bW/2, y: by, width: bW, height: bH, rx:3, fill: line.color
      }));
      g.appendChild(el('text', {
        x: s.x, y: by + bH - 3,
        'font-family':'Arial','font-size':'9','font-weight':'900',
        fill:'#fff','text-anchor':'middle'
      }, line.num));
    });
  });

  svg.appendChild(g);
}

/* ── LEGEND ── */
function buildLegend() {
  const el2 = document.getElementById('legend');
  el2.innerHTML = '<div class="leg-title">Linien</div>' +
    LINES_DEF.map(l => `
      <div class="leg-row">
        <div class="leg-line" style="background:${l.color}"></div>
        <span>${l.num} &mdash; ${l.name}</span>
      </div>`).join('');
}

/* ── INFO PANEL ── */
const tooltip   = document.getElementById('tooltip');
const ttArrow   = document.getElementById('tt-arrow');
let   activeStation = null;

document.getElementById('tt-close').onclick = () => {
  tooltip.classList.remove('show');
  activeStation = null;
};

// Close tooltip on map drag/click-outside
wrap.addEventListener('mousedown', () => {
  tooltip.classList.remove('show');
  activeStation = null;
});

function placeTooltip() {
  if (!activeStation) return;

  // Station world → screen using CURRENT (interpolated) tx/ty/scale
  const sx = activeStation.x * scale + tx;
  const sy = activeStation.y * scale + ty;

  const ttW = tooltip.offsetWidth  || 200;
  const ttH = tooltip.offsetHeight || 160;
  const ww  = wrap.clientWidth;
  const wh  = wrap.clientHeight;
  const HEADER = 56, GAP = 14, ARROW_H = 9;

  // Prefer above, fall back to below
  let top, arrowClass;
  if (sy - ttH - GAP - ARROW_H > HEADER) {
    top = sy - ttH - GAP - ARROW_H;
    arrowClass = 'above';          // arrow at bottom of card pointing down
  } else {
    top = sy + GAP + ARROW_H;
    arrowClass = 'below';          // arrow at top of card pointing up
  }

  // Clamp left within viewport
  let left = sx - ttW / 2;
  left = Math.max(8, Math.min(ww - ttW - 8, left));
  top  = Math.max(HEADER + 4, Math.min(wh - ttH - 8, top));

  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';

  // Arrow: position horizontally over the station dot
  ttArrow.className = 'tt-arrow ' + arrowClass;
  const arrowLeft = Math.max(18, Math.min(ttW - 18, sx - left));
  ttArrow.style.left      = arrowLeft + 'px';
  ttArrow.style.transform = 'translateX(-50%)';
}

function openInfo(s) {
  const lids     = s.lines || [];
  const primLine = lineById[lids[0]] || LINES_DEF[0];

  document.getElementById('tt-pill').textContent       = lids.map(l => lineById[l]?.num).join(' · ');
  document.getElementById('tt-pill').style.background  = primLine.color;
  document.getElementById('tt-name').textContent       = s.name || '';
  document.getElementById('tt-sub').textContent        = s.sub  || '';
  document.getElementById('tt-desc').textContent       = s.desc || '';
  document.getElementById('tt-tags').innerHTML         = (s.tags||[]).map(t =>
    `<span class="tt-tag" style="background:${primLine.color}">${t}</span>`).join('');

  activeStation = s;

  // Show offscreen first so we can measure, then position + reveal
  tooltip.style.left = '-9999px';
  tooltip.style.top  = '-9999px';
  tooltip.classList.add('show');

  requestAnimationFrame(() => {
    placeTooltip();
  });
}

function maybeReposCard() {
  if (activeStation) placeTooltip();
}

/* ── PAN / ZOOM ENGINE ── */
let tx=0, ty=40, scale=0.78;
let tgtX=0, tgtY=40, tgtScale=0.78;
let dragging=false, lastMX=0, lastMY=0, velX=0, velY=0;

function applyT() { svg.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; }

function centre() {
  const ww=wrap.clientWidth, wh=wrap.clientHeight;
  tgtX=tx=ww/2-MAP_W*scale/2; tgtY=ty=wh/2-MAP_H*scale/2-20;
}

(function loop() {
  tx+=(tgtX-tx)*0.13; ty+=(tgtY-ty)*0.13; scale+=(tgtScale-scale)*0.13;
  if (!dragging) { tgtX+=velX; tgtY+=velY; velX*=0.88; velY*=0.88; }
  applyT();
  maybeReposCard();
  requestAnimationFrame(loop);
})();

wrap.addEventListener('mousedown', e => {
  dragging=true; lastMX=e.clientX; lastMY=e.clientY; velX=velY=0;
  wrap.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
  velX=dx*.35; velY=dy*.35; tgtX+=dx; tgtY+=dy;
  lastMX=e.clientX; lastMY=e.clientY;
});
window.addEventListener('mouseup', () => { dragging=false; wrap.classList.remove('grabbing'); });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const d=e.deltaY>0?-.1:.1;
  const wx=(e.clientX-tgtX)/tgtScale, wy=(e.clientY-tgtY)/tgtScale;
  tgtScale=Math.max(.25,Math.min(4,tgtScale+d));
  tgtX=e.clientX-wx*tgtScale; tgtY=e.clientY-wy*tgtScale;
},{passive:false});

function zoomBy(d) {
  const mx=wrap.clientWidth/2, my=wrap.clientHeight/2;
  const wx=(mx-tgtX)/tgtScale, wy=(my-tgtY)/tgtScale;
  tgtScale=Math.max(.25,Math.min(4,tgtScale+d));
  tgtX=mx-wx*tgtScale; tgtY=my-wy*tgtScale;
}
document.getElementById('btn-plus').onclick  = () => zoomBy(.18);
document.getElementById('btn-minus').onclick = () => zoomBy(-.18);

let t1=null, tDist0=1, tScale0=1;
wrap.addEventListener('touchstart', e => {
  if (e.touches.length===1) {
    dragging=true; velX=velY=0;
    lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY;
  } else if (e.touches.length===2) {
    dragging=false;
    tDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    tScale0=tgtScale;
  }
},{passive:true});
wrap.addEventListener('touchmove', e => {
  if (e.touches.length===1 && dragging) {
    const dx=e.touches[0].clientX-lastMX, dy=e.touches[0].clientY-lastMY;
    velX=dx*.35; velY=dy*.35; tgtX+=dx; tgtY+=dy;
    lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY;
  } else if (e.touches.length===2) {
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    tgtScale=Math.max(.25,Math.min(4,tScale0*d/tDist0));
  }
  e.preventDefault();
},{passive:false});
wrap.addEventListener('touchend', () => { dragging=false; });

/* ── BUILD & INIT ── */
buildBg();
buildLines();
buildStations();
buildBadges();
buildLegend();
centre();

setTimeout(() => document.getElementById('hint').classList.add('gone'), 3500);
</script>
